
resolver 10.0.0.1 ipv6=off valid=10s;

upstream prod_servers {
        ip_hash;
        #least_conn;
        #hash $request_uri;
	server dokimion1.psonet max_fails=5 fail_timeout=60s;
	server dokimion2.psonet max_fails=5 fail_timeout=60s;
	server dokimion3.psonet max_fails=5 fail_timeout=60s;

       # number of keep alive connections to upstream
       # servers preserved in the cache of each worker process
       keepalive 64;
}

upstream stage_servers {
        ip_hash;
	#server s-dokimion1.psonet:443 max_fails=3 fail_timeout=30s;   # HTTPS upgrade: talk TLS to the web server
	#server s-dokimion2.psonet max_fails=3 fail_timeout=30s;
	server s-dokimion3.psonet:443 max_fails=3 fail_timeout=30s;

        # number of keep alive connections to upstream
        # servers preserved in the cache of each worker process
        keepalive 64;
}

client_body_timeout   1m; # or 60s
client_header_timeout 1m;
send_timeout          1m;

# Log the real client IP (from Cloudflare) plus the edge IP in parens, e.g. "159.112.216.4 (172.71.x.x)".
log_format custom '$http_cf_connecting_ip ($remote_addr) - $remote_user [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     '"$http_referer" "$http_user_agent"';

# Rate Limiting.
#
# This server is behind Cloudflare AND its nginx build lacks the realip module (set_real_ip_from is
# unknown here), so instead of rewriting $remote_addr we read the real client IP straight from
# Cloudflare's CF-Connecting-IP header ($http_cf_connecting_ip) and key the rate limiter on it.
# The map both selects the key and exempts the test runner:
#   - test runner   -> ""  (an empty key makes nginx SKIP limit_req/limit_conn -> not rate limited)
#   - no CF header  -> connection IP (so a direct/non-Cloudflare request can't bypass limiting)
#   - everyone else -> their real client IP (so one Cloudflare edge IP no longer shares one bucket)
map $http_cf_connecting_ip $rl_key {
    159.112.216.4   "";                    # automated-test (Selenium) runner — exempt
    ""              $binary_remote_addr;   # no CF-Connecting-IP header -> fall back to connection IP
    default         $http_cf_connecting_ip;
}

# General request rate: 10 req/sec per real client IP (test runner exempt via $rl_key)
limit_req_zone $rl_key zone=general:10m rate=10r/s;
# Stricter zone for sensitive/auth endpoints: 5 req/min (test runner exempt). Defined, not yet applied.
limit_req_zone $rl_key zone=auth:10m rate=5r/m;
# Connection limiting: max 20 concurrent connections per real client (test runner exempt)
limit_conn_zone $rl_key zone=conn_limit:10m;

server {
        listen 443 ssl ipv6only=off;
        http2 on;

        ssl_certificate /etc/nginx/sites-available/test_staging.languagetechnology.org.pem;
        ssl_certificate_key /etc/nginx/sites-available/test_staging.languagetechnology.org.key;

        ssl_protocols TLSv1.2 TLSv1.3;

        # Strong cipher suites (TLS 1.3 ciphers are managed a
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
	ssl_prefer_server_ciphers off; # Let client pick among your approved ciphers; 'off' is correct for TLS 1.3

        # Session caching (improves handshake performance)
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off; # Disable unless you rotate

        # OCSP Stapling - supported by cloudflare
        
        # Reduce buffer size to improve TTFB for typical web
        ssl_buffer_size 4k;

        # HSTS — tells browsers to always use HTTPS (1 year)
        # Remove 'preload' and reduce max-age while testing
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Additional security headers (bonus)
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;

        access_log /var/log/nginx/access.log custom;
        error_log /var/log/nginx/error.log warn;

	#server_name dokimion.psonet;
	server_name test_staging.languagetechnology.org;

	location / {
           # Allow short bursts, then throttle (the test runner is exempt via $rl_key).
           limit_req zone=general burst=20 nodelay;
           limit_conn conn_limit 20;
           # Return 429 instead of the default 503 (more semantically correct).
           limit_req_status 429;
           limit_conn_status 429;

           resolver 10.0.0.1 8.8.8.8 ipv6=off valid=300s;
           resolver_timeout 10s;
           set $empty "";

	   # asynchronous thread pools
           aio threads;


          # allows redefining or appending fields to the request
          # header passed to the proxied server
	  proxy_buffering on;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_cache_bypass $http_upgrade;
          proxy_read_timeout 300;
          proxy_send_timeout 300;
          proxy_connect_timeout 300;

          # passes real ip in header to upstream server
          proxy_set_header X-Real-IP $remote_addr;
          # automatically appends $remote_addr to any incoming
          # X-Forwarded-For headers
          proxy_set_header X-Forwarded-for $proxy_add_x_forwarded_for;


          # number and size of the buffers used for reading a response
          # from the proxied server
          proxy_buffers 16 16k;
          # size of buffer used for reading the first part of the response
          # received from the proxied server
          proxy_buffer_size 4k;

	  # HTTPS upgrade (https_upgrade.md Step 2): encrypt the LB -> web-server hop.
	  proxy_ssl_server_name on;            # send SNI so the web server selects its cert
	  proxy_ssl_protocols   TLSv1.2 TLSv1.3;
	  # HTTPS upgrade Step 3: authenticate the upstream (LB trusts only our web server).
	  # The web server's cert is self-signed, so it IS its own trust anchor: point
	  # proxy_ssl_trusted_certificate at a COPY of s-dokimion3.psonet.crt placed on THIS (LB) box.
	  # proxy_ssl_name must match the cert's SAN (DNS:s-dokimion3.psonet). Single upstream here, so one
	  # name is unambiguous (multiple differently-named upstreams would need a shared SAN cert).
	  proxy_ssl_verify on;
	  proxy_ssl_verify_depth 1;             # self-signed leaf = its own anchor, no chain
	  proxy_ssl_trusted_certificate /etc/nginx/sites-available/s-dokimion3.psonet.crt;
	  proxy_ssl_name s-dokimion3.psonet;
	  proxy_pass https://stage_servers$empty;
	}
}

server {
        listen 80 ipv6only=off;

        server_name test_staging.languagetechnology.org;
        return 301 https://$host/$request_uri;

}


